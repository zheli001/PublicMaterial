<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>智能惯蛋 - 横屏优化版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        :root {
            --card-width: 85px;
            --card-height: 120px;
            --card-mini-width: 60px;
            --card-mini-height: 85px;
            --primary: #FFD700;
            --ai-color: #00ff88;
            --turn-indicator: #ff6b6b;
        }
        
        /* 强制横屏提示 */
        @media screen and (orientation: portrait) and (max-width: 600px) {
            #rotate-hint {
                display: flex !important;
            }
            #game-container {
                display: none !important;
            }
        }
        
        #rotate-hint {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10000;
            text-align: center;
            padding: 20px;
        }
        
        #rotate-hint .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: rotatePhone 2s infinite;
        }
        
        @keyframes rotatePhone {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }
        
        html { font-size: 16px; }
        @media (max-width: 900px) { html { font-size: 14px; } }
        @media (max-width: 700px) { html { font-size: 12px; } }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* 菜单 */
        #menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px;
        }
        
        .logo { font-size: 3.5rem; margin-bottom: 10px; }
        .title { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: rgba(255,255,255,0.7); margin-bottom: 30px; text-align: center; }
        
        .menu-btn {
            width: 280px;
            padding: 18px;
            margin: 8px 0;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .menu-btn.primary {
            background: linear-gradient(45deg, var(--primary), #ff8c00);
            color: #000;
            font-weight: bold;
        }
        
        /* 游戏容器 - 横屏优化 */
        #game-container {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: row;
            position: relative;
        }
        
        /* 左侧信息栏 */
        #sidebar {
            width: 200px;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(10px);
        }
        
        @media (max-width: 900px) {
            #sidebar { width: 150px; padding: 15px; }
        }
        
        .info-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        
        .info-title {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }
        
        .turn-indicator {
            background: var(--turn-indicator);
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            animation: pulseTurn 1.5s infinite;
        }
        
        @keyframes pulseTurn {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* 主游戏区 */
        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* 顶部玩家 */
        #top-players {
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            padding: 10px;
        }
        
        .player-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            position: relative;
        }
        
        .player-box.active::before {
            content: '⬇';
            position: absolute;
            top: -25px;
            color: var(--turn-indicator);
            font-size: 1.5rem;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            border: 3px solid rgba(255,255,255,0.3);
            position: relative;
        }
        
        .avatar.ai {
            background: linear-gradient(135deg, var(--ai-color) 0%, #00cc6a 100%);
            border-color: var(--ai-color);
        }
        
        .avatar.active {
            border-color: var(--turn-indicator);
            box-shadow: 0 0 20px var(--turn-indicator);
        }
        
        .player-info {
            text-align: center;
        }
        
        .player-name {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.9);
        }
        
        .player-cards {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: bold;
        }
        
        /* 中央出牌区 */
        #table-center {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        #play-area {
            min-width: 400px;
            min-height: 200px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            border: 3px dashed rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }
        
        @media (max-width: 900px) {
            #play-area { min-width: 300px; min-height: 150px; }
        }
        
        #last-play {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 85px;
        }
        
        .play-info {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.9);
            text-align: center;
            font-weight: bold;
        }
        
        /* 底部我的手牌区 */
        #my-area {
            height: 180px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .my-label {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .auto-sort-btn {
            padding: 5px 12px;
            background: var(--ai-color);
            color: #000;
            border: none;
            border-radius: 15px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
        }
        
        #hand-area {
            display: flex;
            justify-content: center;
            gap: 0;
            overflow-x: auto;
            overflow-y: visible;
            padding: 10px;
            max-width: 100%;
        }
        
        #hand-area::-webkit-scrollbar { display: none; }
        
        /* 扑克牌样式 - 增大并清晰显示花色 */
        .card {
            width: var(--card-width);
            height: var(--card-height);
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            flex-shrink: 0;
            margin-left: -45px;
            border: 2px solid transparent;
        }
        
        .card:first-child { margin-left: 0; }
        
        @media (max-width: 900px) {
            .card {
                width: 70px;
                height: 100px;
                margin-left: -35px;
            }
        }
        
        .card:hover { transform: translateY(-8px); }
        
        .card.selected {
            transform: translateY(-30px) scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255,215,0,0.5);
            z-index: 100;
        }
        
        .card.ai-pick {
            border-color: var(--ai-color);
            box-shadow: 0 0 25px rgba(0,255,136,0.7);
            animation: aiGlow 1.5s infinite;
        }
        
        @keyframes aiGlow {
            0%, 100% { box-shadow: 0 0 25px rgba(0,255,136,0.7); }
            50% { box-shadow: 0 0 35px rgba(0,255,136,1); }
        }
        
        /* 牌面文字 - 增大 */
        .card-corner {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        
        .card-corner .suit-small {
            font-size: 0.9rem;
        }
        
        .card-corner.bottom { 
            transform: rotate(180deg); 
        }
        
        .red { color: #e74c3c; }
        .black { color: #2c3e50; }
        
        /* 中央大花色 */
        .card-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            line-height: 1;
        }
        
        @media (max-width: 900px) {
            .card-center { font-size: 2rem; }
        }
        
        /* 级牌标记 */
        .level-badge-card {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--primary);
            color: #000;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        /* 迷你牌（用于出牌区） */
        .card-mini {
            width: var(--card-mini-width);
            height: var(--card-mini-height);
            background: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px;
            position: relative;
            flex-shrink: 0;
            margin-left: -20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }
        
        .card-mini:first-child { margin-left: 0; }
        
        .card-mini .corner {
            font-size: 0.875rem;
            font-weight: bold;
        }
        
        .card-mini .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
        }
        
        /* 控制按钮 */
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        
        @media (max-width: 900px) {
            #controls {
                bottom: 10px;
                right: 10px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }
        }
        
        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 90px;
        }
        
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .btn-play {
            background: linear-gradient(45deg, var(--primary), #ff8c00);
            color: #000;
        }
        
        .btn-ai {
            background: linear-gradient(45deg, var(--ai-color), #00cc6a);
            color: #000;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        /* AI建议面板 */
        #ai-panel {
            position: absolute;
            top: 20px;
            left: 220px;
            right: 20px;
            background: rgba(0,20,0,0.95);
            border: 2px solid var(--ai-color);
            border-radius: 15px;
            padding: 20px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            z-index: 50;
            backdrop-filter: blur(10px);
        }
        
        @media (max-width: 900px) {
            #ai-panel { left: 170px; }
        }
        
        #ai-panel.show { display: block; }
        
        .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--ai-color);
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .ai-close { cursor: pointer; font-size: 1.3rem; }
        
        .ai-content {
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        /* 记牌器 */
        #recorder-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 40;
            border: 2px solid rgba(255,215,0,0.3);
        }
        
        #recorder {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 200px;
            background: rgba(0,0,0,0.95);
            border-radius: 15px;
            padding: 15px;
            display: none;
            z-index: 45;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        #recorder.show { display: block; }
        
        .rec-title {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        
        .rec-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        
        .rec-item {
            text-align: center;
            padding: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 0.75rem;
        }
        
        .rec-item.out {
            color: #e74c3c;
            text-decoration: line-through;
            opacity: 0.5;
        }
        
        /* Toast提示 */
        #toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.2rem;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            max-width: 80vw;
            text-align: center;
            border: 2px solid var(--primary);
        }
        
        #toast.show { opacity: 1; }
        
        /* 游戏结束 */
        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        
        .result-title { font-size: 3.5rem; margin-bottom: 20px; }
        .result-stats { font-size: 1.5rem; margin-bottom: 30px; text-align: center; line-height: 1.8; }
        
        /* 动画 */
        @keyframes cardFly {
            from { transform: scale(1.3) translateY(-30px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        
        .fly-in { animation: cardFly 0.3s ease-out; }
        
        /* 离线提示 */
        #offline-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #ff6b6b;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 0.875rem;
            z-index: 4000;
            display: none;
        }
        
        #offline-banner.show { display: block; }
    </style>
</head>
<body>
    <!-- 旋转提示 -->
    <div id="rotate-hint">
        <div class="icon">📱</div>
        <div style="font-size: 1.5rem; font-weight: bold; margin-bottom: 10px;">请旋转手机</div>
        <div style="color: rgba(255,255,255,0.7);">为获得最佳游戏体验，请使用横屏模式</div>
    </div>
    
    <!-- 离线提示 -->
    <div id="offline-banner">⚠️ 离线模式 - AI使用本地策略</div>

    <!-- 菜单 -->
    <div id="menu">
        <div class="logo">🃏</div>
        <div class="title">智能惯蛋</div>
        <div class="subtitle">横屏优化版 · 大字大花色 · 自动理牌</div>
        <button class="menu-btn primary" onclick="game.start()">▶ 开始游戏</button>
        <button class="menu-btn" onclick="game.showHelp()">📖 游戏规则</button>
        <div style="margin-top: 20px; color: rgba(255,255,255,0.5); font-size: 0.875rem;">
            提示：建议横屏游玩，牌面更大更清晰
        </div>
    </div>

    <!-- 游戏容器 -->
    <div id="game-container">
        <!-- 左侧信息栏 -->
        <div id="sidebar">
            <div class="info-card">
                <div class="info-title">当前级数</div
